<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로또 당첨번호 & 추천번호</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="topbar">
            <h1>로또 당첨번호 & 추천번호</h1>
            <button id="theme-toggle" type="button" aria-label="day night 전환">Night</button>
            <a href="contact.html" class="contact-button">제휴 문의</a>
            <a href="animal_test.html" class="animal-test-button">동물상 테스트</a>
        </div>

        <section class="card">
            <h2>최근 회차 당첨번호</h2>
            <div id="latest-result">
                <p class="loading">최신 당첨번호를 불러오는 중...</p>
            </div>
        </section>

        <section class="card">
            <div class="card-header">
                <h2>추천번호 5세트</h2>
                <button id="generate-btn" type="button">번호 다시 뽑기</button>
            </div>
            <div id="lotto-sets-container"></div>
        </section>

        <p class="source">
            데이터 출처:
            <a href="https://api.lotto-haru.kr/win/analysis" target="_blank" rel="noopener noreferrer">api.lotto-haru.kr</a>
        </p>
    </div>
    <template id="number-template">
        <span class="number"></span>
    </template>
    <script src="main.js"></script>
</body>
</html>
