
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lotto Number Recommendation</title>
    
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="theme-switch-wrapper">
        <label class="theme-switch" for="checkbox">
            <input type="checkbox" id="checkbox" />
            <div class="slider round"></div>
        </label>
    </div>
    <div class="container">
        <div class="winning-results">
            <h2>Recent Winning Numbers</h2>
            <div id="winning-numbers-display" class="lotto-set">
                <!-- Winning numbers will be displayed here -->
                <span class="number static">--</span>
                <span class="number static">--</span>
                <span class="number static">--</span>
                <span class="number static">--</span>
                <span class="number static">--</span>
                <span class="number static">--</span>
                <span class="number static bonus">+--</span>
            </div>
            <p class="api-info">Live winning numbers require a backend proxy due to CORS restrictions.</p>
        </div>

        <h1>Lotto Number Recommendation</h1>
        <div id="lotto-sets-container">
            <!-- Lotto number sets will be generated here by JavaScript -->
        </div>
        <button id="generate-btn">Generate Numbers</button>
    </div>
    <script src="main.js"></script>
</body>
</html>
