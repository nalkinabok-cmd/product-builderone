<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>동물상 테스트</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@1.3.1/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@0.8/dist/teachablemachine-image.min.js"></script>
</head>
<body>
    <div class="animal-test-container">
        <h1>강아지/고양이 동물상 테스트</h1>
        <p>이미지를 업로드하여 당신의 동물상을 테스트해보세요!</p>

        <input type="file" id="image-upload" accept="image/*" class="file-input">
        <button id="predict-button" class="action-button">테스트 시작</button>

        <div class="image-preview-area">
            <img id="uploaded-image" src="#" alt="업로드된 이미지 미리보기" style="display: none;">
            <p id="upload-placeholder">여기에 이미지를 업로드하세요</p>
        </div>

        <div id="prediction-result" class="prediction-result">
            결과: <span id="result-text">준비 중...</span>
        </div>

        <p class="back-to-main"><a href="index.html">메인 페이지로 돌아가기</a></p>
    </div>

    <script src="animal_test.js"></script>
</body>
</html>
